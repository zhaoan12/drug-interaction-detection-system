[project]
name = "ddi-research-system"
random_seed = 7

[paths]
raw_pairs = "data/raw/drug_pairs.jsonl"
reference_dir = "data/reference"
artifacts_dir = "artifacts"
reports_dir = "reports"
tracking_dir = "artifacts/tracking"

[dataset]
train_fraction = 0.6
validation_fraction = 0.2
minimum_examples_per_label = 1

[training]
epochs = 60
learning_rate = 0.12
l2_penalty = 0.0005
full_feature_set = true

[inference]
max_evidence_items = 4
probability_floor = 0.0001

[service]
host = "127.0.0.1"
port = 8080

